<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Crypto Screener</title>
    <style>
        body { margin: 0; background: #0a0e27; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { color: #667eea; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Crypto Futures Screener</h1>
        <!-- TradingView Widget -->
        <div class="tradingview-widget-container">
            <div id="tradingview_screener"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-screener-api.js"></script>
            <script type="text/javascript">
            new TradingView.widget({
                "width": "100%",
                "height": 800,
                "defaultColumn": "overview",
                "defaultScreen": "general",
                "market": "crypto",
                "showToolbar": true,
                "colorTheme": "dark",
                "locale": "ru",
                "container_id": "tradingview_screener"
            });
            </script>
        </div>
    </div>
</body>
</html>
